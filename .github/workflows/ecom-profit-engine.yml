# Scheduled run: set secrets SHOPIFY_STORE, SHOPIFY_TOKEN, META_TOKEN, AD_ACCOUNT_ID,
# GOOGLE_SHEET_NAME, GOOGLE_CREDENTIALS_JSON (full service account JSON text).

name: Ecom Profit Engine

on:
  schedule:
    # Every 3 hours (UTC); adjust as needed
    - cron: "20 */3 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ecom-profit-engine

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_TOKEN }}
          META_TOKEN: ${{ secrets.META_TOKEN }}
          AD_ACCOUNT_ID: ${{ secrets.AD_ACCOUNT_ID }}
          GOOGLE_SHEET_NAME: ${{ secrets.GOOGLE_SHEET_NAME }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: python main.py
